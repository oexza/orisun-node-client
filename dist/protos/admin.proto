syntax = "proto3";

package orisun;

option go_package = "github.com/OrisunLabs/Orisun/orisun/grpcapi";
option java_package = "com.orisun.admin";

import "google/protobuf/timestamp.proto";
import "eventstore.proto";

// AdminUser represents a user in the system
message AdminUser {
  string user_id = 1;
  string name = 2;
  string username = 3;
  repeated string roles = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// CreateUserRequest creates a new user
message CreateUserRequest {
  string name = 1;
  string username = 2;
  string password = 3;
  repeated string roles = 4;
}

// CreateUserResponse returns the created user
message CreateUserResponse {
  AdminUser user = 1;
}

// DeleteUserRequest deletes a user by ID
message DeleteUserRequest {
  string user_id = 1;
}

// DeleteUserResponse indicates success
message DeleteUserResponse {
  bool success = 1;
}

// ChangePasswordRequest changes a user's password
message ChangePasswordRequest {
  string user_id = 1;
  string current_password = 2;
  string new_password = 3;
}

// ChangePasswordResponse indicates success
message ChangePasswordResponse {
  bool success = 1;
}

// ListUsersRequest lists all users
message ListUsersRequest {
  // Empty for now, could add pagination/filtering later
}

// ListUsersResponse returns list of users
message ListUsersResponse {
  repeated AdminUser users = 1;
}

// ValidateCredentialsRequest validates username/password
message ValidateCredentialsRequest {
  string username = 1;
  string password = 2;
}

// ValidateCredentialsResponse returns validation result
message ValidateCredentialsResponse {
  bool success = 1;
  AdminUser user = 2;
}

// GetUserCountRequest gets total user count
message GetUserCountRequest {
  // Empty
}

// GetUserCountResponse returns user count
message GetUserCountResponse {
  int64 count = 1;
}

// GetEventCountRequest gets event count for a boundary
message GetEventCountRequest {
  string boundary = 1;
}

// GetEventCountResponse returns event count
message GetEventCountResponse {
  int64 count = 1;
}

// BoundaryPlacementInput selects the durable backend and its physical
// namespace (a PostgreSQL schema or SQLite database namespace).
message BoundaryPlacementInput {
  string backend = 1;
  string namespace = 2;
}

enum BoundaryLifecycleStatus {
  BOUNDARY_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  BOUNDARY_LIFECYCLE_STATUS_PROVISIONING = 1;
  BOUNDARY_LIFECYCLE_STATUS_ACTIVE = 2;
  BOUNDARY_LIFECYCLE_STATUS_FAILED = 3;
}

enum BoundaryRegistrationOrigin {
  BOUNDARY_REGISTRATION_ORIGIN_UNSPECIFIED = 0;
  BOUNDARY_REGISTRATION_ORIGIN_CREATED = 1;
  BOUNDARY_REGISTRATION_ORIGIN_IMPORTED = 2;
}

message BoundaryInfo {
  string name = 1;
  string description = 2;
  BoundaryPlacementInput placement = 3;
  BoundaryLifecycleStatus status = 4;
  BoundaryRegistrationOrigin origin = 5;
  string last_error = 6;
  Position definition_position = 7;
  Position status_position = 8;
}

message CreateBoundaryRequest {
  string name = 1;
  string description = 2;
  BoundaryPlacementInput placement = 3;
}

message CreateBoundaryResponse {
  BoundaryInfo boundary = 1;
}

// ImportBoundary registers a physical boundary that already exists. The
// normal provisioning handler validates/applies its migrations idempotently.
message ImportBoundaryRequest {
  string name = 1;
  string description = 2;
  BoundaryPlacementInput placement = 3;
}

message ImportBoundaryResponse {
  BoundaryInfo boundary = 1;
}

message ListBoundariesRequest {}

message ListBoundariesResponse {
  repeated BoundaryInfo boundaries = 1;
}

message GetBoundaryRequest {
  string name = 1;
}

message GetBoundaryResponse {
  BoundaryInfo boundary = 1;
}

// Admin service provides user management and administrative operations
service Admin {
  // Boundary Management
  rpc CreateBoundary(CreateBoundaryRequest) returns (CreateBoundaryResponse);
  rpc ImportBoundary(ImportBoundaryRequest) returns (ImportBoundaryResponse);
  rpc ListBoundaries(ListBoundariesRequest) returns (ListBoundariesResponse);
  rpc GetBoundary(GetBoundaryRequest) returns (GetBoundaryResponse);

  // User Management
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Authentication
  rpc ValidateCredentials(ValidateCredentialsRequest) returns (ValidateCredentialsResponse);

  // Statistics
  rpc GetUserCount(GetUserCountRequest) returns (GetUserCountResponse);
  rpc GetEventCount(GetEventCountRequest) returns (GetEventCountResponse);

}
